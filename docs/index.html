<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Veille Tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { 
            color: #ff6b35;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .article {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6b35;
        }
        .article h2 {
            color: #ff6b35;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .article .meta {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 10px;
        }
        .article .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .tag {
            background: #0f3460;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #4da6ff;
        }
        .score {
            background: #ff6b35;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #fff;
            margin-left: 10px;
        }
        .summary {
            margin-top: 10px;
            color: #ddd;
        }
        .empty {
            text-align: center;
            color: #666;
            margin-top: 50px;
        }
        a { color: #4da6ff; }
        a:hover { color: #ff6b35; }
        .date-separator {
            color: #666;
            font-size: 0.9em;
            margin: 30px 0 15px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>🦞 Veille Tech</h1>
    <p class="subtitle">Articles pertinents sélectionnés par Terry</p>
    
    <div id="articles">
        <p class="empty">Chargement des articles...</p>
    </div>

    <script>
        fetch('veille.json')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('articles');
                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="empty">Aucun article pour le moment. Revenez bientôt !</p>';
                    return;
                }
                
                // Grouper par date
                const byDate = {};
                data.forEach(a => {
                    const date = a.date || 'Date inconnue';
                    if (!byDate[date]) byDate[date] = [];
                    byDate[date].push(a);
                });
                
                let html = '';
                Object.keys(byDate).sort().reverse().forEach(date => {
                    html += `<div class="date-separator">📅 ${date}</div>`;
                    byDate[date].forEach(a => {
                        html += `
                            <div class="article">
                                <h2>${a.title}</h2>
                                <div class="meta">
                                    ${a.source ? `<a href="${a.source}" target="_blank">Source</a>` : ''}
                                    <span class="score">Score: ${a.score || 'N/A'}</span>
                                </div>
                                <p class="summary">${a.summary || ''}</p>
                                <div class="tags">
                                    ${(a.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    });
                });
                
                container.innerHTML = html;
            })
            .catch(() => {
                document.getElementById('articles').innerHTML = 
                    '<p class="empty">Aucun article pour le moment. Revenez bientôt !</p>';
            });
    </script>
</body>
</html>
